<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f0e8;
         display: flex; height: 100vh; overflow: hidden; }

  /* ---- SIDEBAR ---- */
  .sidebar { width: 260px; background: #1a1a2e; color: #e2d8c8;
             display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
  .sidebar h2 { font-size: 14px; font-weight: 600; padding: 0 20px 16px;
                border-bottom: 1px solid rgba(255,255,255,.08); color: #e2d8c8; }
  .sidebar .new-chat { margin: 16px; padding: 10px;
                       background: rgba(200,75,49,.15); border: 1px solid rgba(200,75,49,.3);
                       border-radius: 6px; color: #e2d8c8; font-size: 13px;
                       cursor: pointer; text-align: center; }
  .sidebar .new-chat:hover { background: rgba(200,75,49,.25); }
  .history-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .history-item { padding: 8px 20px; font-size: 12px; color: rgba(226,216,200,.5);
                  cursor: pointer; white-space: nowrap; overflow: hidden;
                  text-overflow: ellipsis; }
  .history-item:hover { background: rgba(255,255,255,.05); color: rgba(226,216,200,.9); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08);
                    font-size: 12px; }
  .sidebar-footer a { color: rgba(226,216,200,.4); text-decoration: none; }
  .sidebar-footer a:hover { color: rgba(226,216,200,.8); }

  /* ---- MAIN ---- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* ---- MESSAGES ---- */
  .messages { flex: 1; overflow-y: auto; padding: 32px; display: flex;
              flex-direction: column; gap: 24px; }
  .message { max-width: 820px; width: 100%; margin: 0 auto; }
  .message.user { align-self: flex-end; max-width: 600px; }
  .user-bubble { background: #1a1a2e; color: #e2d8c8; border-radius: 18px 18px 4px 18px;
                 padding: 12px 18px; font-size: 14px; line-height: 1.6; }
  .assistant-wrap { display: flex; flex-direction: column; gap: 10px; }

  /* intent badge */
  .intent-badge { display: flex; align-items: center; gap: 8px; }
  .intent-pill { font-family: monospace; font-size: 11px; letter-spacing: 1px;
                 padding: 3px 10px; border-radius: 3px; color: #fff;
                 text-transform: uppercase; }
  .intent-conf { font-size: 12px; color: #7a7060; }

  /* answer */
  .answer-bubble { background: white; border: 1px solid #cfc8b8; border-radius: 4px 18px 18px 18px;
                   padding: 16px 20px; font-size: 14px; line-height: 1.75; }
  .answer-bubble p { margin-bottom: 10px; }
  .answer-bubble p:last-child { margin-bottom: 0; }

  /* sources */
  .sources { display: flex; flex-direction: column; gap: 6px; }
  .source-item { background: #ede8de; border: 1px solid #cfc8b8; border-radius: 4px;
                 padding: 8px 12px; font-size: 12px; display: flex; gap: 10px;
                 align-items: flex-start; }
  .source-num { background: #1a1a2e; color: #e2d8c8; border-radius: 2px;
                width: 20px; height: 20px; display: flex; align-items: center;
                justify-content: center; font-size: 10px; flex-shrink: 0; }
  .source-meta { color: #7a7060; font-size: 11px; margin-bottom: 3px; }
  .source-text { color: #3a3525; line-height: 1.5; }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  /* eval scores */
  .eval-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .eval-badge { font-size: 11px; font-family: monospace; padding: 3px 10px;
                border-radius: 3px; border: 1px solid; }

  /* prompt viewer */
  .prompt-viewer { border: 1px solid #cfc8b8; border-radius: 4px; overflow: hidden; }
  .prompt-toggle { background: #ede8de; border: none; width: 100%; text-align: left;
                   padding: 8px 12px; font-size: 12px; color: #7a7060; cursor: pointer;
                   font-family: monospace; }
  .prompt-toggle:hover { background: #e0dace; }
  .prompt-content { display: none; padding: 12px; background: #1a1a2e; color: #c3e88d;
                    font-family: monospace; font-size: 11px; white-space: pre-wrap;
                    line-height: 1.6; max-height: 300px; overflow-y: auto; }
  .prompt-content.open { display: block; }

  /* loading */
  .loading { display: flex; gap: 4px; align-items: center; padding: 12px 0; }
  .loading span { width: 8px; height: 8px; background: #c84b31; border-radius: 50%;
                  animation: bounce 1s infinite; }
  .loading span:nth-child(2) { animation-delay: .15s; }
  .loading span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ---- INPUT ---- */
  .input-area { border-top: 1px solid #cfc8b8; padding: 20px 32px; background: #f5f0e8; }
  .input-row { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; }
  textarea { flex: 1; border: 1px solid #cfc8b8; border-radius: 8px; padding: 12px 16px;
             font-family: inherit; font-size: 14px; resize: none; background: white;
             outline: none; min-height: 48px; max-height: 200px; line-height: 1.5; }
  textarea:focus { border-color: #1a1a2e; }
  .send-btn { background: #1a1a2e; color: #e2d8c8; border: none; border-radius: 8px;
              width: 48px; height: 48px; cursor: pointer; font-size: 18px;
              display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { background: #c84b31; }
  .input-hint { max-width: 820px; margin: 8px auto 0; font-size: 11px; color: #7a7060;
                font-family: monospace; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>RAG Chatbot</h2>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
  <div class="history-list" id="historyList"></div>
  <div class="sidebar-footer">
    <a href="/ui/admin.html">⚙ Admin Panel</a>
  </div>
</div>

<div class="main">
  <div class="messages" id="messages">
    <div class="message" style="text-align:center; color:#7a7060; font-size:13px; margin-top:40px;">
      Upload a document via <code>POST /upload</code>, then ask anything about it.
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Ask something about your documents…"
                rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="send()">↑</button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line · uses /ask-stream</div>
  </div>
</div>

<script>
const INTENT_COLORS = {
  RAG_QUERY: '#2e4057', CHITCHAT: '#2e86ab',
  GENERAL_KNOWLEDGE: '#e8a838', OUT_OF_SCOPE: '#c84b31'
};

const scoreColor = s => s > 0.7 ? '#2d6a4f' : s > 0.5 ? '#e8a838' : '#c84b31';
const evalClass  = s => s > 0.7 ? 'good' : s > 0.5 ? 'ok' : 'bad';

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

// Auto-resize textarea as user types
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

function addMessage(role, content) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = content;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function showLoading() {
  return addMessage('assistant', `
    <div class="assistant-wrap">
      <div class="loading">
        <span></span><span></span><span></span>
      </div>
    </div>`);
}

async function send() {
  const input = document.getElementById('input');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  input.style.height = 'auto';

  // Show user message
  addMessage('user', `<div class="user-bubble">${escHtml(q)}</div>`);
  const loadingEl = showLoading();

  // Use /ask (non-streaming) to get full trace including chunks + eval
  try {
    const res  = await fetch('/ask?q=' + encodeURIComponent(q));
    const data = await res.json();
    loadingEl.remove();
    renderResponse(data);
    loadHistory();
  } catch(e) {
    loadingEl.remove();
    addMessage('assistant',
      '<div class="answer-bubble">Error connecting to the API.</div>');
  }
}

function renderResponse(data) {
  const intentColor = INTENT_COLORS[data.intent] || '#7a7060';
  const confPct     = Math.round((data.confidence || 0) * 100);

  // Sources HTML (only for RAG_QUERY)
  let sourcesHtml = '';
  if (data.intent === 'RAG_QUERY' && data.chunks && data.chunks.length) {
    const items = data.chunks.map((c, i) => `
      <div class="source-item">
        <div class="score-dot"
             style="background:${scoreColor(c.rerank_score)}"></div>
        <div>
          <div class="source-meta">${escHtml(c.source)} · p.${c.page}
            · rerank: ${c.rerank_score}</div>
          <div class="source-text">${escHtml(c.text.substring(0, 280))}…</div>
        </div>
      </div>`).join('');
    sourcesHtml = `<div class="sources">${items}</div>`;
  }

  // RAGAS eval HTML
  let evalHtml = '';
  if (data.eval && data.eval.faithfulness !== undefined) {
    const e = data.eval;
    evalHtml = `
      <div class="eval-row">
        ${evalBadge('Faithfulness', e.faithfulness)}
        ${evalBadge('Relevancy', e.answer_relevancy)}
        ${evalBadge('Context Precision', e.context_precision)}
      </div>`;
  }

  // Prompt viewer
  const promptHtml = data.generation?.prompt ? `
    <div class="prompt-viewer">
      <button class="prompt-toggle"
              onclick="this.nextElementSibling.classList.toggle('open')">
        🔍 View full prompt sent to LLM
      </button>
      <div class="prompt-content">${escHtml(data.generation.prompt)}</div>
    </div>` : '';

  addMessage('assistant', `
    <div class="assistant-wrap">
      <div class="intent-badge">
        <span class="intent-pill"
              style="background:${intentColor}">${data.intent}</span>
        <span class="intent-conf">${confPct}% confidence</span>
        ${data.cached ? '<span class="intent-conf">· cached</span>' : ''}
      </div>
      <div class="answer-bubble">${formatAnswer(data.answer)}</div>
      ${sourcesHtml}
      ${evalHtml}
      ${promptHtml}
    </div>`);
}

function evalBadge(label, score) {
  const color = scoreColor(score);
  return `<span class="eval-badge"
     style="color:${color}; border-color:${color}; background:${color}18">
    ${label}: ${score}
  </span>`;
}

// Format plain text answer: wrap paragraphs in <p> tags
function formatAnswer(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(p =>
    `<p>${escHtml(p.trim())}</p>`).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'"');
}

async function loadHistory() {
  try {
    const res  = await fetch('/admin/history');
    const data = await res.json();
    const list = document.getElementById('historyList');
    list.innerHTML = data.slice(0, 20).map(h => `
      <div class="history-item" title="${escHtml(h.question)}">
        ${escHtml(h.question.substring(0, 40))}
      </div>`).join('');
  } catch(e) {}
}

function newChat() {
  document.getElementById('messages').innerHTML = `
    <div class="message" style="text-align:center; color:#7a7060;
         font-size:13px; margin-top:40px;">
      New chat started.
    </div>`;
}

// Load history on page open
loadHistory();
</script>
</body>
</html>
